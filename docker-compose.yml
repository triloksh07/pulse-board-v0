version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: pulseboard-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      # Database name that will be created automatically
      MONGO_INITDB_DATABASE: pulseboard
    volumes:
      # Persistent storage for database data
      - mongodb_data:/data/db
    healthcheck:
      # Check if MongoDB is ready to accept connections
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
    driver: local
