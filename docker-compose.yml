services:
  mongodb:
    image: mongo:7.0
    container_name: pulseboard-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: pulseboard
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
    container_name: pulseboard-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/pulseboard
      - JWT_SECRET=${JWT_SECRET:-fallback_secret_for_local_testing}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5173} 
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
    driver: local